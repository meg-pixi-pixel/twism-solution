<canvas id="c"></canvas>
<div id="headline" style="text-align:center;padding:18px 20px 4px;background:#080808;">
  <div style="font-family:'Arial Black',sans-serif;font-size:clamp(16px,2.2vw,24px);font-weight:900;color:#fff;letter-spacing:.01em;">Every merchant. Every consumer. One connection.</div>
  <div style="font-family:Arial,sans-serif;font-size:clamp(11px,1.2vw,14px);color:rgba(255,255,255,0.38);margin-top:5px;">Data and value flow in both directions — the whole network benefits.</div>
</div>
<div id="legend" style="display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:center;padding:10px 20px 16px;background:#080808;">
  <div style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.42);">
    <div style="width:8px;height:8px;border-radius:50%;background:#63b3ed;flex-shrink:0"></div>Consumer data → Twism
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.42);">
    <div style="width:8px;height:8px;border-radius:50%;background:#fbbf24;flex-shrink:0"></div>Rewards → consumers
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.42);">
    <div style="width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0"></div>Merchant data → Twism
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.42);">
    <div style="width:8px;height:8px;border-radius:50%;background:#a3e635;flex-shrink:0"></div>Insights → merchants
  </div>
</div>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080808; }
canvas { display:block; }
</style>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = window.innerWidth;
const H = canvas.height = Math.max(420, Math.min(window.innerHeight - 110, 580));
const cx = W/2, cy = H/2;

// ── REAL PEOPLE PHOTOS via DiceBear (SVG avatars rendered as images) ──────
// Using randomuser.me style: realistic photo avatars from UI Avatars + face seeds
// We'll use https://randomuser.me portrait-style URLs via picsum with face crops
// Actually using: thispersondoesnotexist style via generated avatar services on CDN

const peopleSeeds = [
  { url: 'https://i.pravatar.cc/80?img=47', label: 'Mia' },
  { url: 'https://i.pravatar.cc/80?img=12', label: 'Carlos' },
  { url: 'https://i.pravatar.cc/80?img=29', label: 'Priya' },
  { url: 'https://i.pravatar.cc/80?img=5',  label: 'Jordan' },
  { url: 'https://i.pravatar.cc/80?img=44', label: 'Sam' },
  { url: 'https://i.pravatar.cc/80?img=16', label: 'Alex' },
];

const merchantConfigs = [
  { icon:'☕', label:'Coffee', bg:'#1a0f00', accent:'#f59e0b' },
  { icon:'🍕', label:'Pizza',  bg:'#1a0500', accent:'#ef4444' },
  { icon:'🍷', label:'Wine Bar', bg:'#0d0018', accent:'#8b5cf6' },
  { icon:'🏋️', label:'Gym',   bg:'#001520', accent:'#06b6d4' },
  { icon:'🍣', label:'Sushi', bg:'#001a0a', accent:'#10b981' },
  { icon:'👗', label:'Boutique', bg:'#1a001a', accent:'#ec4899' },
];

// Pre-load all person images
const personImgs = peopleSeeds.map(p => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = p.url;
  return img;
});

const nodeR = 28;
const ringR = Math.min(W * 0.34, H * 0.41);
const N = 12;

// Build nodes: alternating consumer/merchant around ring
const nodes = [];
for (let i = 0; i < N; i++) {
  const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
  const isConsumer = (i % 2 === 0);
  const idx = Math.floor(i / 2);
  const rvar = ringR * (1 + (((i * 5) % 5) - 2) * 0.04);
  nodes.push({
    x: cx + rvar * Math.cos(angle),
    y: cy + rvar * Math.sin(angle),
    r: nodeR,
    type: isConsumer ? 'consumer' : 'merchant',
    idx,
    phase: (i / N) * Math.PI * 2,
    wobbleSpeed: 0.55 + (i % 4) * 0.1,
    label: isConsumer ? peopleSeeds[idx].label : merchantConfigs[idx].label,
    color: isConsumer ? '#4f72ff' : merchantConfigs[idx].accent,
  });
}

// ── PARTICLES ────────────────────────────────────────────────────────────
const HUB = { x: cx, y: cy };

class Particle {
  constructor(from, to, color, delay, sz) {
    this.from = from; this.to = to; this.color = color;
    this.t = -delay; this.speed = 0.004 + Math.random() * 0.003;
    this.sz = sz || 3;
    this.wobbleFrom = 0; this.wobbleTo = 0;
  }
  update() {
    this.t += this.speed;
    if (this.t > 1.25) this.t = -0.2 - Math.random() * 0.4;
  }
  draw(ctx) {
    const tc = Math.max(0, Math.min(1, this.t));
    if (this.t < 0) return;
    const alpha = tc < 0.12 ? tc / 0.12 : tc > 0.88 ? (1 - tc) / 0.12 : 1;
    const fy = this.from.y + (this.fromWobble || 0);
    const ty = this.to.y + (this.toWobble || 0);
    const px = this.from.x + (this.to.x - this.from.x) * tc;
    const py = fy + (ty - fy) * tc;
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.beginPath(); ctx.arc(px, py, this.sz, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.fill();
    ctx.globalAlpha = alpha * 0.3;
    ctx.beginPath(); ctx.arc(px - this.sz * 0.28, py - this.sz * 0.28, this.sz * 0.38, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  }
}

const particles = [];
nodes.forEach((n, i) => {
  const toColor = n.type === 'consumer' ? '#63b3ed' : n.color;
  const fromColor = n.type === 'consumer' ? '#fbbf24' : '#a3e635';
  for (let j = 0; j < 3; j++) {
    const p1 = new Particle(n, HUB, toColor, j * 0.34 + i * 0.06, 2.8);
    p1.nodeIdx = i; p1.fromNode = true;
    particles.push(p1);
    const p2 = new Particle(HUB, n, fromColor, j * 0.34 + i * 0.06 + 0.17, 3.2);
    p2.nodeIdx = i; p2.toNode = true;
    particles.push(p2);
  }
});

// ── DRAW HELPERS ─────────────────────────────────────────────────────────
function drawEdge(ctx, a, ay, b, by, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(a.x, (a.y || 0) + ay);
  ctx.lineTo(b.x, (b.y || 0) + by);
  ctx.stroke(); ctx.restore();
}

function drawHub(ctx, t) {
  // outer glow
  ctx.save();
  ctx.globalAlpha = 0.11 + 0.04 * Math.sin(t);
  ctx.beginPath(); ctx.arc(cx, cy, 70 + Math.sin(t * 1.4) * 3, 0, Math.PI * 2);
  ctx.fillStyle = '#1E40FF'; ctx.fill(); ctx.restore();

  // rotating dash ring
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.strokeStyle = '#4f72ff'; ctx.lineWidth = 1;
  ctx.setLineDash([5, 9]); ctx.lineDashOffset = -t * 14;
  ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();

  // main circle
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI * 2);
  ctx.fillStyle = '#1E40FF'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial Black, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('TWISM', cx, cy - 7);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '9px Arial, sans-serif';
  ctx.fillText('NETWORK', cx, cy + 9);
  ctx.restore();
}

function drawConsumerNode(ctx, n, wobble) {
  const x = n.x, y = n.y + wobble;
  const img = personImgs[n.idx];

  // glow
  ctx.save();
  ctx.globalAlpha = 0.14;
  ctx.beginPath(); ctx.arc(x, y, n.r + 11, 0, Math.PI * 2);
  ctx.fillStyle = n.color; ctx.fill(); ctx.restore();

  // clip circle and draw photo
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, n.r, 0, Math.PI * 2); ctx.clip();
  if (img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x - n.r, y - n.r, n.r * 2, n.r * 2);
  } else {
    ctx.fillStyle = '#1a1a3e'; ctx.fill();
    ctx.fillStyle = '#93b4ff'; ctx.font = `${n.r * 0.5}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.label[0], x, y);
  }
  ctx.restore();

  // border ring
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, n.r, 0, Math.PI * 2);
  ctx.strokeStyle = n.color; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();

  // label
  ctx.save();
  ctx.fillStyle = '#93b4ff';
  ctx.font = '500 10px Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(n.label, x, y + n.r + 4); ctx.restore();
}

function drawMerchantNode(ctx, n, wobble) {
  const x = n.x, y = n.y + wobble;
  const mc = merchantConfigs[n.idx];

  // glow
  ctx.save();
  ctx.globalAlpha = 0.14;
  ctx.beginPath(); ctx.arc(x, y, n.r + 11, 0, Math.PI * 2);
  ctx.fillStyle = mc.accent; ctx.fill(); ctx.restore();

  // clip + bg
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, n.r, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = mc.bg; ctx.fillRect(x - n.r, y - n.r, n.r * 2, n.r * 2);
  ctx.font = `${n.r * 1.05}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(mc.icon, x, y + 2);
  ctx.restore();

  // border
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, n.r, 0, Math.PI * 2);
  ctx.strokeStyle = mc.accent; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();

  // label
  ctx.save();
  ctx.fillStyle = '#fde68a';
  ctx.font = '500 10px Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(n.label, x, y + n.r + 4); ctx.restore();
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
let t = 0;
const wobbles = new Array(N).fill(0);

// Trigger redraw when images load
personImgs.forEach(img => { img.onload = () => {}; });

function frame() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080808'; ctx.fillRect(0, 0, W, H);

  // centre glow
  const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.44);
  rg.addColorStop(0, 'rgba(30,64,255,0.08)');
  rg.addColorStop(1, 'transparent');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);

  t += 0.016;
  nodes.forEach((n, i) => { wobbles[i] = Math.sin(t * n.wobbleSpeed + n.phase) * 2.2; });

  // edges
  nodes.forEach((n, i) => drawEdge(ctx, n, wobbles[i], HUB, 0, n.color, 0.13));

  // update particle wobbles
  particles.forEach(p => {
    if (p.fromNode !== undefined) {
      p.fromWobble = wobbles[p.nodeIdx] || 0;
    }
    if (p.toNode !== undefined) {
      p.toWobble = wobbles[p.nodeIdx] || 0;
    }
  });

  // particles
  particles.forEach(p => { p.update(); p.draw(ctx); });

  // nodes
  nodes.forEach((n, i) => {
    if (n.type === 'consumer') drawConsumerNode(ctx, n, wobbles[i]);
    else drawMerchantNode(ctx, n, wobbles[i]);
  });
  drawHub(ctx, t);

  requestAnimationFrame(frame);
}
frame();
</script>
