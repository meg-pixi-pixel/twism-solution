
<style>
  .flow-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .step-nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .step-dot {
    width: 32px; height: 32px; border-radius: 50%;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
  }
  .step-dot.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }
  .step-dot.done {
    background: var(--color-background-success);
    color: var(--color-text-success);
    border-color: var(--color-border-success);
  }
  .card-stage {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 2rem 2rem 1.5rem;
    min-height: 260px;
    position: relative;
    overflow: hidden;
  }
  .stage-label {
    font-size: 11px; font-weight: 500; letter-spacing: .08em;
    text-transform: uppercase; color: var(--color-text-tertiary);
    margin-bottom: .5rem;
  }
  .stage-title {
    font-size: 20px; font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: .75rem;
    line-height: 1.3;
  }
  .stage-desc {
    font-size: 14px; color: var(--color-text-secondary);
    line-height: 1.6; max-width: 460px;
  }
  .stage-icon {
    position: absolute; right: 2rem; top: 2rem;
    width: 64px; height: 64px;
    border-radius: var(--border-radius-lg);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btns { display: flex; justify-content: space-between; margin-top: 1.5rem; gap: 12px; }
  .btn {
    font-size: 13px; font-weight: 500;
    padding: 8px 20px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    cursor: pointer; transition: all .15s;
  }
  .btn:hover { background: var(--color-background-tertiary); }
  .btn.primary {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }
  .btn.primary:hover { opacity: .85; }
  .btn:disabled { opacity: .3; cursor: default; }
  .fade-in { animation: fi .35s ease forwards; }
  @keyframes fi { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .icon-consumer { background: var(--color-background-info); }
  .icon-twism { background: var(--color-background-success); }
  .icon-pos { background: #fef3c7; }
  @media (prefers-color-scheme: dark) { .icon-pos { background: #3a2e0c; } }
  .icon-display { background: var(--color-background-secondary); }

  .pill {
    display: inline-block;
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 99px;
    margin-bottom: 1rem;
  }
  .pill-consumer { background: var(--color-background-info); color: var(--color-text-info); }
  .pill-twism    { background: var(--color-background-success); color: var(--color-text-success); }
  .pill-pos      { background: #fef3c7; color: #92400e; }
  @media (prefers-color-scheme: dark) {
    .pill-pos { background: #3a2e0c; color: #fbbf24; }
  }
  .pill-display  { background: var(--color-background-secondary); color: var(--color-text-secondary); }
</style>

<div class="flow-wrap">
  <h2 class="sr-only">Coin redemption flow via POS integration — 7 steps</h2>

  <div class="step-nav" id="dots"></div>

  <div class="card-stage" id="stage-card">
    <div id="stage-content"></div>
  </div>

  <div class="nav-btns">
    <button class="btn" id="prev-btn" onclick="go(-1)">← Back</button>
    <button class="btn primary" id="next-btn" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const steps = [
  {
    actor: 'consumer', pill: 'Consumer action', pillClass: 'pill-consumer',
    title: 'Consumer opens the app',
    desc: 'The customer launches the wallet app and views their available coin balance, ready to redeem at checkout.',
    icon: '📱',
    iconClass: 'icon-consumer'
  },
  {
    actor: 'consumer', pill: 'Consumer action', pillClass: 'pill-consumer',
    title: 'Selects a merchant to redeem at',
    desc: 'The consumer browses participating merchants and selects the one they\'re currently shopping at.',
    icon: '🏪',
    iconClass: 'icon-consumer'
  },
  {
    actor: 'consumer', pill: 'Consumer action', pillClass: 'pill-consumer',
    title: 'Specifies coin amount',
    desc: 'The consumer enters how many coins they want to apply to their purchase, then confirms the transaction.',
    icon: '🪙',
    iconClass: 'icon-consumer'
  },
  {
    actor: 'consumer', pill: 'Consumer action', pillClass: 'pill-consumer',
    title: 'Consumer confirms',
    desc: 'A summary screen shows the discount or gift card value to be applied. The consumer approves the redemption.',
    icon: '✅',
    iconClass: 'icon-consumer'
  },
  {
    actor: 'twism', pill: 'Twism × POS integration', pillClass: 'pill-twism',
    title: 'Twism generates a discount code',
    desc: 'Twism\'s platform calls the POS API and returns a unique discount or gift card code equivalent to the coin value.',
    icon: '⚙️',
    iconClass: 'icon-twism'
  },
  {
    actor: 'display', pill: 'Consumer display', pillClass: 'pill-display',
    title: 'Confirmation code shown',
    desc: 'The consumer sees the unique discount code on their screen. If the POS supports QR codes, a scannable code appears.',
    icon: '📲',
    iconClass: 'icon-display'
  },
  {
    actor: 'pos', pill: 'Cashier action', pillClass: 'pill-pos',
    title: 'Cashier applies the code at checkout',
    desc: 'The cashier scans or enters the discount or gift card code. The discount is applied and the sale completes.',
    icon: '🖥️',
    iconClass: 'icon-pos'
  }
];

let cur = 0;

function render() {
  const s = steps[cur];
  const content = document.getElementById('stage-content');
  content.innerHTML = `
    <div class="fade-in">
      <div class="stage-icon ${s.iconClass}" style="font-size:28px">${s.icon}</div>
      <div class="stage-label">Step ${cur+1} of ${steps.length}</div>
      <div class="pill ${s.pillClass}">${s.pill}</div>
      <div class="stage-title">${s.title}</div>
      <div class="stage-desc">${s.desc}</div>
    </div>
  `;
  // dots
  const dots = document.getElementById('dots');
  dots.innerHTML = steps.map((_, i) =>
    `<div class="step-dot ${i < cur ? 'done' : i === cur ? 'active' : ''}" onclick="jumpTo(${i})">${i < cur ? '✓' : i+1}</div>`
  ).join('');
  document.getElementById('prev-btn').disabled = cur === 0;
  const nb = document.getElementById('next-btn');
  nb.textContent = cur === steps.length - 1 ? 'Restart ↺' : 'Next →';
}

function go(dir) {
  if (dir === 1 && cur === steps.length - 1) { cur = 0; }
  else cur = Math.max(0, Math.min(steps.length - 1, cur + dir));
  render();
}

function jumpTo(i) { cur = i; render(); }

render();
</script>
