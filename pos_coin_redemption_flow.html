<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Redemption Flow</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1e1e1e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.flow-wrap { width: 100%; max-width: 620px; padding: 1.5rem 0; }
.step-nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
.step-dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid #2a2a2a;
  background: #181818;
  color: #888888;
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s;
}
.step-dot.active { background: #1E40FF; border-color: #1E40FF; color: #ffffff; }
.step-dot.done { background: #0f3d2a; border-color: #1a5c3e; color: #4ade80; }
.card-stage {
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 2rem 2rem 1.5rem;
  min-height: 260px;
  position: relative;
  overflow: hidden;
}
.stage-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: #888888; margin-bottom: .5rem; }
.stage-title { font-size: 20px; font-weight: 500; color: #ffffff; margin-bottom: .75rem; line-height: 1.3; }
.stage-desc { font-size: 14px; color: #bbbbbb; line-height: 1.6; max-width: 420px; }
.stage-icon {
  position: absolute; right: 2rem; top: 2rem;
  width: 64px; height: 64px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.icon-consumer { background: #1a2a4a; }
.icon-twism    { background: #0f2e1e; }
.icon-pos      { background: #2e2010; }
.icon-display  { background: #181818; }
.pill {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 99px;
  margin-bottom: 1rem;
}
.pill-consumer { background: #1a2a4a; color: #4f72ff; }
.pill-twism    { background: #0f2e1e; color: #4ade80; }
.pill-pos      { background: #2e2010; color: #fbbf24; }
.pill-display  { background: #181818; color: #888888; }
.nav-btns { display: flex; justify-content: space-between; margin-top: 1.5rem; gap: 12px; }
.btn {
  font-size: 13px; font-weight: 500;
  padding: 8px 20px; border-radius: 8px;
  border: 1px solid #2a2a2a;
  background: #181818;
  color: #ffffff;
  cursor: pointer; transition: all .15s;
}
.btn:hover { background: #111111; }
.btn.primary { background: #1E40FF; border-color: #1E40FF; color: #ffffff; }
.btn.primary:hover { background: #4f72ff; }
.btn:disabled { opacity: .3; cursor: default; }
.fade-in { animation: fi .35s ease forwards; }
@keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="flow-wrap">
  <div class="step-nav" id="dots"></div>
  <div class="card-stage">
    <div id="stage-content"></div>
  </div>
  <div class="nav-btns">
    <button class="btn" id="prev-btn" onclick="go(-1)">← Back</button>
    <button class="btn primary" id="next-btn" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const steps = [
  { pill: 'Consumer action', pillClass: 'pill-consumer', title: 'Consumer opens the app', desc: 'The customer launches the wallet app and views their available coin balance, ready to redeem at checkout.', icon: '📱', iconClass: 'icon-consumer' },
  { pill: 'Consumer action', pillClass: 'pill-consumer', title: 'Selects a merchant to redeem at', desc: 'The consumer browses participating merchants and selects the one they\'re currently shopping at.', icon: '🏪', iconClass: 'icon-consumer' },
  { pill: 'Consumer action', pillClass: 'pill-consumer', title: 'Specifies coin amount', desc: 'The consumer enters how many coins they want to apply to their purchase, then confirms the transaction.', icon: '🪙', iconClass: 'icon-consumer' },
  { pill: 'Consumer action', pillClass: 'pill-consumer', title: 'Consumer confirms', desc: 'A summary screen shows the discount or gift card value to be applied. The consumer approves the redemption.', icon: '✅', iconClass: 'icon-consumer' },
  { pill: 'Twism × POS integration', pillClass: 'pill-twism', title: 'Twism generates a discount code', desc: 'Twism\'s platform calls the POS API and returns a unique discount or gift card code equivalent to the coin value.', icon: '⚙️', iconClass: 'icon-twism' },
  { pill: 'Consumer display', pillClass: 'pill-display', title: 'Confirmation code shown', desc: 'The consumer sees the unique discount code on their screen. If the POS supports QR codes, a scannable code appears.', icon: '📲', iconClass: 'icon-display' },
  { pill: 'Cashier action', pillClass: 'pill-pos', title: 'Cashier applies the code at checkout', desc: 'The cashier scans or enters the discount or gift card code. The discount is applied and the sale completes.', icon: '🖥️', iconClass: 'icon-pos' }
];

let cur = 0;
function render() {
  const s = steps[cur];
  document.getElementById('stage-content').innerHTML = `
    <div class="fade-in">
      <div class="stage-icon ${s.iconClass}">${s.icon}</div>
      <div class="stage-label">Step ${cur + 1} of ${steps.length}</div>
      <div class="pill ${s.pillClass}">${s.pill}</div>
      <div class="stage-title">${s.title}</div>
      <div class="stage-desc">${s.desc}</div>
    </div>`;
  document.getElementById('dots').innerHTML = steps.map((_, i) =>
    `<div class="step-dot ${i < cur ? 'done' : i === cur ? 'active' : ''}" onclick="jumpTo(${i})">${i < cur ? '✓' : i + 1}</div>`
  ).join('');
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').textContent = cur === steps.length - 1 ? 'Restart ↺' : 'Next →';
}
function go(dir) {
  if (dir === 1 && cur === steps.length - 1) { cur = 0; }
  else cur = Math.max(0, Math.min(steps.length - 1, cur + dir));
  render();
}
function jumpTo(i) { cur = i; render(); }
render();
</script>
</body>
</html>
